<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/blogs.css">
    <title>ksel172 - Blog</title>
</head>
<body>
    <canvas id="background"></canvas>
    <header>
        <div class="container">
            <nav>
                <div class="logo" id="logo">ksel172</div>
                <div class="nav-toggle" id="navToggle" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="/index.html" data-section="home">Home</a></li>
                    <li><a href="/blogs.html" class="active">Blogs</a></li>
                    <li><a href="#lab" data-section="lab">Lab</a></li>
                    <li class="cta-buttons"><button id="contactBtn">Get in Touch</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="blogs" class="active-section">
            <div class="content">
                <h1>Blog Posts</h1>
                <div class="blog-filters">
                    <input type="text" id="searchInput" placeholder="Search blogs...">
                    <select id="tagFilter">
                        <option value="">All Tags</option>
                    </select>
                </div>
                <div id="blogList" class="blog-grid"></div>
                <div id="pagination" class="pagination"></div>
            </div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Get in Touch</h2>
            <form id="contactForm">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
    
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2024 Konstantin Seliadtsou. All rights reserved.</p>
            <div class="social-icons">
                <a href="https://github.com/ksel172" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://gitlab.com/ksel172" target="_blank" rel="noopener noreferrer" aria-label="GitLab">
                    <i class="fab fa-gitlab"></i>
                </a>
                <a href="https://www.linkedin.com/in/konstantin-seliadtsou-9906571bb/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="mailto:kseliadtsou@gmail.com" aria-label="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/blog.js"></script>
</body>
</html>
